# ─── Volume ──────────────────────────────────────────────────────────────────
UP              add volume 5
DOWN            add volume -5
WHEEL_UP        add volume 5
WHEEL_DOWN      add volume -5
m               cycle mute

# ─── Seeking ─────────────────────────────────────────────────────────────────
RIGHT           seek 10
LEFT            seek -10
Shift+RIGHT     seek 3
Shift+LEFT      seek -3
Ctrl+RIGHT      seek 60
Ctrl+LEFT       seek -60
.               frame-step
,               frame-back-step

# ─── Vim hjkl ────────────────────────────────────────────────────────────────
l               seek 10
h               seek -10
Shift+l         seek 3
Shift+h         seek -3
Ctrl+l          seek 60
Ctrl+h          seek -60
k               add volume 5
j               add volume -5

# ─── Playback Speed ──────────────────────────────────────────────────────────
[               add speed -0.1
]               add speed 0.1
BACKSPACE       set speed 1.0

# ─── Playlist / Files ────────────────────────────────────────────────────────
PGUP            playlist-prev
PGDWN           playlist-next
>               playlist-next
<               playlist-prev

# ─── Playback ────────────────────────────────────────────────────────────────
SPACE           cycle pause
ENTER           cycle pause
q               quit-watch-later
Q               quit

# ─── Fullscreen ──────────────────────────────────────────────────────────────
f               cycle fullscreen
ESC             set fullscreen no

# ─── Subtitles ───────────────────────────────────────────────────────────────
v               cycle sub-visibility
n               cycle sub
N               cycle sub down
z               add sub-delay -0.1
x               add sub-delay +0.1
Shift+G         add sub-pos -1
Shift+F         add sub-pos +1

# ─── Audio ───────────────────────────────────────────────────────────────────
a               cycle audio
Shift+A         cycle audio down
Ctrl+UP         add audio-delay 0.1
Ctrl+DOWN       add audio-delay -0.1

# ─── Screenshot ──────────────────────────────────────────────────────────────
s               screenshot
S               screenshot video

# ─── Zoom / Pan ──────────────────────────────────────────────────────────────
Alt+UP          add video-pan-y -0.05
Alt+DOWN        add video-pan-y 0.05
Alt+LEFT        add video-pan-x 0.05
Alt+RIGHT       add video-pan-x -0.05
Alt+=           add video-zoom 0.1
Alt+-           add video-zoom -0.1
Alt+BACKSPACE   set video-zoom 0 ; set video-pan-x 0 ; set video-pan-y 0

# ─── Chapters ────────────────────────────────────────────────────────────────
Shift+PGUP      add chapter -1
Shift+PGDWN     add chapter 1
