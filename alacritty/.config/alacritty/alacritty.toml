general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]

[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[font]
normal = { family = "JetBrainsMono Nerd Font" }
bold = { family = "JetBrainsMono Nerd Font" }
italic = { family = "JetBrainsMono Nerd Font" }
size = 14

[window]
padding.x = 14
padding.y = 14
decorations = "None"
opacity = 0.90
blur = true

[keyboard]
bindings = [
{ key = "Insert", mods = "Shift", action = "Paste" },
{ key = "Insert", mods = "Control", action = "Copy" }
]

[colors]
[colors.primary]
background = "#15151f"  # change this to whatever darkness you want
foreground = "#cdd6f4"  # keep your existing foreground
